name: Benchmark — Hical

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    name: Build & load test Hical

    steps:
      - name: Checkout Zyra
        uses: actions/checkout@v4

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-14 \
            g++-14 \
            libboost-all-dev \
            libssl-dev \
            zlib1g-dev \
            wrk

      - name: Configure Hical benchmark
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S benchmark/hical -B build/hical -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Hical benchmark
        run: |
          START=$(date +%s%N)
          cmake --build build/hical --config Release
          END=$(date +%s%N)
          echo "HICAL_BUILD_MS=$(( (END - START) / 1000000 ))" >> "$GITHUB_ENV"

      - name: Measure Hical binary
        run: |
          HICAL_BIN="build/hical/hical_benchmark_server"
          HICAL_SIZE=$(du -sh "$HICAL_BIN" | cut -f1)
          HICAL_BYTES=$(stat --format=%s "$HICAL_BIN")
          echo "HICAL_BIN=$HICAL_BIN" >> "$GITHUB_ENV"
          echo "HICAL_SIZE=$HICAL_SIZE" >> "$GITHUB_ENV"
          echo "HICAL_BYTES=$HICAL_BYTES" >> "$GITHUB_ENV"

      - name: Load test Hical
        run: |
          set -euo pipefail

          "$HICAL_BIN" --port 3000 --threads 2 &
          HICAL_PID=$!
          trap 'kill $HICAL_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 0.2
          done

          HICAL_RSS_BEFORE=$(ps -o rss= -p "$HICAL_PID" | tr -d ' ')
          WRK_OUT=$(wrk -t2 -c100 -d10s http://127.0.0.1:3000/)
          echo "$WRK_OUT"
          HICAL_RSS_AFTER=$(ps -o rss= -p "$HICAL_PID" | tr -d ' ')

          HICAL_RSS_KB=$(( HICAL_RSS_BEFORE > HICAL_RSS_AFTER ? HICAL_RSS_BEFORE : HICAL_RSS_AFTER ))
          HICAL_RAM_MB=$(awk "BEGIN{printf \"%.1f\", $HICAL_RSS_KB / 1024}")
          HICAL_RPS=$(echo "$WRK_OUT" | grep 'Requests/sec' | awk '{print $2}')
          HICAL_LAT=$(echo "$WRK_OUT" | grep 'Latency' | awk '{print $2 " " $3}')

          echo "HICAL_RPS=$HICAL_RPS" >> "$GITHUB_ENV"
          echo "HICAL_LAT=$HICAL_LAT" >> "$GITHUB_ENV"
          echo "HICAL_RAM_MB=$HICAL_RAM_MB" >> "$GITHUB_ENV"

      - name: Post benchmark summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEREDOC'
          ## 📊 Hical benchmark

          | Metric | Hical |
          |--------|-------|
          HEREDOC
          echo "| Server binary | $HICAL_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full build time | ${HICAL_BUILD_MS} ms |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Requests/sec** (wrk, 2t/100c/10s) | **${HICAL_RPS}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Avg latency** | **${HICAL_LAT}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **RAM usage** (under load) | **${HICAL_RAM_MB} MB** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Measured on GitHub Actions \`ubuntu-24.04\`. Hical is fetched from \`Hical61/Hical@main\`. Load test: \`wrk -t2 -c100 -d10s\` against \`GET /\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Save benchmark JSON
        run: |
          mkdir -p benchmarks
          python3 << 'PYEOF'
          import json, os, time

          data = {
              "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "runner": "ubuntu-24.04",
              "tool": "wrk -t2 -c100 -d10s",
              "url": "http://127.0.0.1:3000/",
              "hical": {
                  "requests_per_sec": float(os.environ.get("HICAL_RPS", "0")),
                  "avg_latency": os.environ.get("HICAL_LAT", ""),
                  "ram_mb": float(os.environ.get("HICAL_RAM_MB", "0")),
                  "build_time_ms": int(os.environ.get("HICAL_BUILD_MS", "0")),
                  "binary_size": os.environ.get("HICAL_SIZE", ""),
                  "binary_bytes": int(os.environ.get("HICAL_BYTES", "0")),
              },
          }

          with open("benchmarks/hical-latest.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")

          print(json.dumps(data, indent=2))
          PYEOF

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: hical-benchmark
          path: benchmarks/hical-latest.json

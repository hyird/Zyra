name: Benchmark — Zyra vs Hical

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark-zyra:
    runs-on: ubuntu-24.04
    name: Benchmark Zyra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wrk \
            curl

      - name: Build Zyra
        run: |
          START=$(date +%s%N)
          zig build -Doptimize=ReleaseFast
          END=$(date +%s%N)
          echo "ZYRA_BUILD_MS=$(( (END - START) / 1000000 ))" >> "$GITHUB_ENV"

      - name: Measure Zyra binary
        run: |
          ZYRA_BIN="zig-out/bin/zyra-demo"
          ZYRA_SIZE=$(du -sh "$ZYRA_BIN" | cut -f1)
          ZYRA_BYTES=$(stat --format=%s "$ZYRA_BIN")
          echo "ZYRA_BIN=$ZYRA_BIN" >> "$GITHUB_ENV"
          echo "ZYRA_SIZE=$ZYRA_SIZE" >> "$GITHUB_ENV"
          echo "ZYRA_BYTES=$ZYRA_BYTES" >> "$GITHUB_ENV"

      - name: Load test Zyra
        run: |
          set -euo pipefail

          "$ZYRA_BIN" &
          ZYRA_PID=$!
          trap 'kill $ZYRA_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 0.2
          done

          ZYRA_RSS_BEFORE=$(ps -o rss= -p "$ZYRA_PID" | tr -d ' ')
          WRK_OUT=$(wrk -t2 -c100 -d10s http://127.0.0.1:3000/)
          echo "$WRK_OUT"
          ZYRA_RSS_AFTER=$(ps -o rss= -p "$ZYRA_PID" | tr -d ' ')

          ZYRA_RSS_KB=$(( ZYRA_RSS_BEFORE > ZYRA_RSS_AFTER ? ZYRA_RSS_BEFORE : ZYRA_RSS_AFTER ))
          ZYRA_RAM_MB=$(awk "BEGIN{printf \"%.1f\", $ZYRA_RSS_KB / 1024}")
          ZYRA_RPS=$(echo "$WRK_OUT" | grep 'Requests/sec' | awk '{print $2}')
          ZYRA_LAT=$(echo "$WRK_OUT" | grep 'Latency' | awk '{print $2 " " $3}')

          echo "ZYRA_RPS=$ZYRA_RPS" >> "$GITHUB_ENV"
          echo "ZYRA_LAT=$ZYRA_LAT" >> "$GITHUB_ENV"
          echo "ZYRA_RAM_MB=$ZYRA_RAM_MB" >> "$GITHUB_ENV"

          kill "$ZYRA_PID" 2>/dev/null || true
          trap - EXIT

      - name: Save Zyra benchmark JSON
        run: |
          mkdir -p benchmarks
          python3 << 'PYEOF'
          import json, os, time

          data = {
              "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "runner": "ubuntu-24.04",
              "tool": "wrk -t2 -c100 -d10s",
              "zyra": {
                  "url": "http://127.0.0.1:3000/",
                  "requests_per_sec": float(os.environ.get("ZYRA_RPS", "0")),
                  "avg_latency": os.environ.get("ZYRA_LAT", ""),
                  "ram_mb": float(os.environ.get("ZYRA_RAM_MB", "0")),
                  "build_time_ms": int(os.environ.get("ZYRA_BUILD_MS", "0")),
                  "binary_size": os.environ.get("ZYRA_SIZE", ""),
                  "binary_bytes": int(os.environ.get("ZYRA_BYTES", "0")),
              },
          }

          with open("benchmarks/zyra.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")

          print(json.dumps(data, indent=2))
          PYEOF

      - name: Upload Zyra benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-zyra
          path: benchmarks/zyra.json

  benchmark-hical:
    runs-on: ubuntu-24.04
    name: Benchmark Hical

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-14 \
            g++-14 \
            libboost-all-dev \
            libssl-dev \
            zlib1g-dev \
            wrk \
            curl

      - name: Configure Hical benchmark
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S benchmark/hical -B build/hical -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Hical benchmark
        run: |
          START=$(date +%s%N)
          cmake --build build/hical --config Release
          END=$(date +%s%N)
          echo "HICAL_BUILD_MS=$(( (END - START) / 1000000 ))" >> "$GITHUB_ENV"

      - name: Measure Hical binary
        run: |
          HICAL_BIN="build/hical/hical_benchmark_server"
          HICAL_SIZE=$(du -sh "$HICAL_BIN" | cut -f1)
          HICAL_BYTES=$(stat --format=%s "$HICAL_BIN")
          echo "HICAL_BIN=$HICAL_BIN" >> "$GITHUB_ENV"
          echo "HICAL_SIZE=$HICAL_SIZE" >> "$GITHUB_ENV"
          echo "HICAL_BYTES=$HICAL_BYTES" >> "$GITHUB_ENV"

      - name: Load test Hical
        run: |
          set -euo pipefail

          "$HICAL_BIN" --port 3001 --threads 2 &
          HICAL_PID=$!
          trap 'kill $HICAL_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1:3001/ >/dev/null; then
              break
            fi
            sleep 0.2
          done

          HICAL_RSS_BEFORE=$(ps -o rss= -p "$HICAL_PID" | tr -d ' ')
          WRK_OUT=$(wrk -t2 -c100 -d10s http://127.0.0.1:3001/)
          echo "$WRK_OUT"
          HICAL_RSS_AFTER=$(ps -o rss= -p "$HICAL_PID" | tr -d ' ')

          HICAL_RSS_KB=$(( HICAL_RSS_BEFORE > HICAL_RSS_AFTER ? HICAL_RSS_BEFORE : HICAL_RSS_AFTER ))
          HICAL_RAM_MB=$(awk "BEGIN{printf \"%.1f\", $HICAL_RSS_KB / 1024}")
          HICAL_RPS=$(echo "$WRK_OUT" | grep 'Requests/sec' | awk '{print $2}')
          HICAL_LAT=$(echo "$WRK_OUT" | grep 'Latency' | awk '{print $2 " " $3}')

          echo "HICAL_RPS=$HICAL_RPS" >> "$GITHUB_ENV"
          echo "HICAL_LAT=$HICAL_LAT" >> "$GITHUB_ENV"
          echo "HICAL_RAM_MB=$HICAL_RAM_MB" >> "$GITHUB_ENV"

          kill "$HICAL_PID" 2>/dev/null || true
          trap - EXIT

      - name: Save Hical benchmark JSON
        run: |
          mkdir -p benchmarks
          python3 << 'PYEOF'
          import json, os, time

          data = {
              "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "runner": "ubuntu-24.04",
              "tool": "wrk -t2 -c100 -d10s",
              "hical": {
                  "url": "http://127.0.0.1:3001/",
                  "requests_per_sec": float(os.environ.get("HICAL_RPS", "0")),
                  "avg_latency": os.environ.get("HICAL_LAT", ""),
                  "ram_mb": float(os.environ.get("HICAL_RAM_MB", "0")),
                  "build_time_ms": int(os.environ.get("HICAL_BUILD_MS", "0")),
                  "binary_size": os.environ.get("HICAL_SIZE", ""),
                  "binary_bytes": int(os.environ.get("HICAL_BYTES", "0")),
              },
          }

          with open("benchmarks/hical.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")

          print(json.dumps(data, indent=2))
          PYEOF

      - name: Upload Hical benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-hical
          path: benchmarks/hical.json

  summarize:
    runs-on: ubuntu-24.04
    name: Summarize benchmark results
    needs:
      - benchmark-zyra
      - benchmark-hical

    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: benchmarks
          merge-multiple: true

      - name: Merge benchmark JSON
        run: |
          python3 << 'PYEOF'
          import json, time
          from pathlib import Path

          with open("benchmarks/zyra.json", "r", encoding="utf-8") as f:
              zyra_data = json.load(f)
          with open("benchmarks/hical.json", "r", encoding="utf-8") as f:
              hical_data = json.load(f)

          data = {
              "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "runner": "ubuntu-24.04",
              "tool": "wrk -t2 -c100 -d10s",
              "zyra": zyra_data["zyra"],
              "hical": hical_data["hical"],
          }

          Path("benchmarks").mkdir(exist_ok=True)
          with open("benchmarks/latest.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")

          print(json.dumps(data, indent=2))
          PYEOF

      - name: Post comparison summary
        run: |
          python3 << 'PYEOF'
          import json
          import os

          with open("benchmarks/latest.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          zyra = data["zyra"]
          hical = data["hical"]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("## 📊 Zyra vs Hical — Benchmark\n\n")
              f.write("| Request metric | **Zyra** | **Hical** |\n")
              f.write("|----------------|----------|-----------|\n")
              f.write(f"| **Requests/sec** (wrk, 2t/100c/10s) | **{zyra['requests_per_sec']}** | **{hical['requests_per_sec']}** |\n")
              f.write(f"| **Avg latency** | **{zyra['avg_latency']}** | **{hical['avg_latency']}** |\n\n")
              f.write("> Measured on GitHub Actions `ubuntu-24.04`. Load test: `wrk -t2 -c100 -d10s` against `GET /`. Runtime-adjacent metrics such as binary size, build time, and RSS are intentionally excluded from the comparison table.\n")
          PYEOF

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/latest.json
